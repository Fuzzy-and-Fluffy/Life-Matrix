                                                        </span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}

                                    <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-3">
                                        <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest">我的复盘</h4>
                                        <textarea value={reviewText} onChange={e => setReviewText(e.target.value)}
                                            placeholder="这个月有什么收获和反思？"
                                            className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-600 outline-none focus:ring-2 focus:ring-sky-100 min-h-[120px] resize-none" />
                                        <button onClick={handleSaveReview} className="w-full py-3 rounded-xl text-xs font-black text-white bg-sky-500 hover:bg-sky-600 transition-all">保存复盘</button>
                                    </div>

                                    {/* AI 复盘 */}
                                    <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-3">
                                        <div className="flex items-center gap-2">
                                            <Icon name="sparkle" size={16} className="text-violet-500" />
                                            <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest">AI 辅助复盘</h4>
                                        </div>
                                        <input type="password" value={aiKey} onChange={e => setAiKey(e.target.value)} placeholder="Google Gemini API Key"
                                            className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs text-slate-500 outline-none focus:ring-2 focus:ring-violet-100" />
                                        <p className="text-[9px] text-slate-300">Key 仅保存在本地浏览器</p>
                                        <button onClick={handleGenerateAI} disabled={aiLoading}
                                            className="w-full py-3 rounded-xl text-xs font-black text-white bg-gradient-to-r from-violet-500 to-purple-500 hover:shadow-lg disabled:opacity-50 transition-all flex items-center justify-center gap-2">
                                            {aiLoading ? (<><svg className="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none" /><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" /></svg> 生成中...</>) : (<><Icon name="sparkle" size={14} /> 生成 AI 复盘</>)}
                                        </button>
                                        {aiError && <div className="bg-rose-50 border border-rose-200 rounded-xl p-3 text-rose-600 text-xs font-bold">{aiError}</div>}
                                        {aiResult && <div className="bg-slate-50 rounded-xl p-4 border border-slate-200 space-y-1">{renderMarkdown(aiResult)}</div>}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 底部关闭按钮 */}
                        <div className="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-slate-50 to-transparent pointer-events-none flex justify-center">
                            <button onClick={onClose} className="pointer-events-auto bg-slate-900 text-white px-10 py-3.5 rounded-full font-black text-xs uppercase tracking-widest shadow-xl flex items-center gap-2 hover:scale-105 active:scale-95 transition-all mb-4">
                                <Icon name="close" size={16} /> 关闭
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 4. 主逻辑 App
        // ==========================================
        const INITIAL_SYSTEM_TAGS = [
            { id: 'tag_1', name: '人生中的第一次', appliesTo: [] }, // 空数组表示应用到所有维度
            { id: 'tag_2', name: '里程碑', appliesTo: [] }
        ];

        // 从文本中解析所有格式的标签：【】、[]、#...#、#
        const parseTagsFromText = (text) => {
            if (!text) return [];
            const matches = [];

            // 1. 解析【】格式
            const regex1 = /【([^】]+)】/g;
            let match;
            while ((match = regex1.exec(text)) !== null) {
                const tag = match[1].trim();
                if (tag && !matches.includes(tag)) {
                    matches.push(tag);
                }
            }

            // 2. 解析[]格式
            const regex2 = /\[([^\]]+)\]/g;
            while ((match = regex2.exec(text)) !== null) {
                const tag = match[1].trim();
                if (tag && !matches.includes(tag)) {
                    matches.push(tag);
                }
            }

            // 3. 解析#标签#格式（双井号，支持空格）
            const regex3a = /#([^#]+)#/g;
            while ((match = regex3a.exec(text)) !== null) {
                const tag = match[1].trim();
                if (tag && !matches.includes(tag)) {
                    matches.push(tag);
                }
            }

            // 4. 解析#标签格式（单井号，不支持空格）
            const regex3 = /#([^\s#\[\]【】\,\.。，！？\!\?]+)/g;
            while ((match = regex3.exec(text)) !== null) {
                const tag = match[1].trim();
                if (tag && !matches.includes(tag)) {
                    matches.push(tag);
                }
            }

            return matches;
        };

        // 统一标签格式：将文本中的 #标签#、#标签 和 [标签] 转换为【标签】
        const normalizeTagsInText = (text) => {
            if (!text) return text;
            let normalized = text;
            normalized = normalized.replace(/\[([^\]]+)\]/g, '【$1】');
            // 先处理双井号格式 #tag#（支持空格）
            normalized = normalized.replace(/#([^#]+)#/g, '【$1】');
            // 再处理单井号格式 #tag（不支持空格）
            normalized = normalized.replace(/#([^\s#\[\]【】\,\.。，！？\!\?]+)/g, '【$1】');
            return normalized;
        };

        // 自动识别文本中的标签词并加上【】
        const autoWrapTagsInText = (text, availableTags) => {
            if (!text || !availableTags || availableTags.length === 0) return text;
            let result = text;
            const sortedTags = [...availableTags].sort((a, b) => b.length - a.length);

            sortedTags.forEach(tag => {
                if (!tag || tag.trim().length === 0) return;
                const escapedTag = tag.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(`(?<!【)${escapedTag}(?!】)`, 'g');
                result = result.replace(regex, (match, offset) => {
                    const before = result.substring(0, offset);
                    const openCount = (before.match(/【/g) || []).length;
                    const closeCount = (before.match(/】/g) || []).length;
                    if (openCount > closeCount) return match;
                    return `【${match}】`;
                });
            });
            return result;
        };

        // 更新最近使用的标签列表（保持最新的10个）
        const updateRecentTags = (currentRecentTags, newTags) => {
            if (!newTags || newTags.length === 0) return currentRecentTags;
            const updated = [...currentRecentTags];
            newTags.forEach(tag => {
                const index = updated.indexOf(tag);
                if (index > -1) updated.splice(index, 1);
                updated.unshift(tag);
            });
            return updated.slice(0, 10);
        };

        const App = () => {
            const [step, setStep] = useState(1);
            const [name, setName] = useState("");
            const [avatar, setAvatar] = useState(null);
            const [dimensions, setDimensions] = useState(INITIAL_DIMS);
            const [scores, setScores] = useState([]);
            const [history, setHistory] = useState([]);
            const [systemTags, setSystemTags] = useState(INITIAL_SYSTEM_TAGS);
            const [recentTags, setRecentTags] = useState([]); // 最近使用的标签历史（最多10个）
            const [monthlyPlans, setMonthlyPlans] = useState({});

            // Firebase Auth State
            const [currentUser, setCurrentUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [syncStatus, setSyncStatus] = useState('idle'); // 'idle' | 'syncing' | 'synced' | 'offline'
            const [isNewUser, setIsNewUser] = useState(false); // 是否为新用户（无云端数据）

            // Modal States
            const [modalType, setModalType] = useState(null); // 'record' | 'calendar' | 'settings' | 'auth' | null
            const [selectedDimIdx, setSelectedDimIdx] = useState(0);
            const [editingRecordIdx, setEditingRecordIdx] = useState(null); // null 表示新建，数字表示编辑第几条记录
            const [customDimName, setCustomDimName] = useState("");

            const fileInputRef = useRef(null);

            // --- 常量 ---
            const STORAGE_KEY = 'life_matrix_v34_csv';
            const getMonthKey = (date) => `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;

            // --- 从 localStorage 加载 ---
            const loadFromLocalStorage = () => {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (data) {
                            if (data.name) setName(data.name);
                            if (data.avatar) setAvatar(data.avatar);
                            if (data.dimensions) setDimensions(data.dimensions);
                            if (data.scores) setScores(data.scores);

                            // 直接加载历史记录，不执行迁移
                            // 标签迁移只在导入或手动触发时执行
                            if (data.history) {
                                setHistory(data.history);
                            }

                            if (data.systemTags) setSystemTags(data.systemTags);
                            if (data.recentTags) setRecentTags(data.recentTags);
                            if (data.monthlyPlans) setMonthlyPlans(data.monthlyPlans);
                            // 有 dimensions 就说明是老用户，跳转到雷达图
                            if (data.dimensions && data.dimensions.length > 0) {
                                setStep(4);
                            }
                        }
                    }
                } catch (e) {
                    console.error("LocalStorage load error", e);
                }
            };

            // --- 数据健康检查：确保关键字段不丢失 ---
            const ensureDataIntegrity = (data, currentState) => {
                const repaired = { ...data };
                let hasRepairs = false;

                // 确保 name 和 avatar 不丢失
                if (!repaired.name && currentState.name) {
                    console.log('[Data Integrity] 修复丢失的 name:', currentState.name);
                    repaired.name = currentState.name;
                    hasRepairs = true;
                }
                if (!repaired.avatar && currentState.avatar) {
                    console.log('[Data Integrity] 修复丢失的 avatar');
                    repaired.avatar = currentState.avatar;
                    hasRepairs = true;
                }

                if (hasRepairs) {
                    console.log('[Data Integrity] 数据已修复');
                }

                return repaired;
            };

            // --- 标签迁移函数：识别历史数据中的标签（优化版）---
            const migrateHistoryTags = (historyData) => {
                if (!historyData || historyData.length === 0) return historyData;

                // 检查是否所有记录都已经有标签，如果是则跳过迁移
                const needsMigration = historyData.some(record => !record.tags || record.tags.length === 0);
                if (!needsMigration) {
                    return historyData; // 所有记录都有标签，无需迁移
                }

                let hasChanges = false;
                let migratedCount = 0;
                const migratedHistory = historyData.map(record => {
                    // 如果记录没有 tags 字段或 tags 为空数组，尝试从 text 中提取
                    if (!record.tags || record.tags.length === 0) {
                        const extractedTags = parseTagsFromText(record.text);
                        if (extractedTags && extractedTags.length > 0) {
                            hasChanges = true;
                            migratedCount++;
                            return { ...record, tags: extractedTags };
                        }
                    }
                    return record;
                });

                if (hasChanges) {
                    console.log(`[Tag Migration] 完成标签迁移，共更新 ${migratedCount} 条记录的标签`);
                }

                return migratedHistory;
            };

            // --- 立即从 localStorage 加载（PWA 快速启动优化）---
            useEffect(() => {
                console.time('[Perf] Data Load');

                // 检查是否有本地数据，立即关闭 loading
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        if (data && data.dimensions && data.dimensions.length > 0) {
                            // 有数据就立即关闭 loading，让界面先渲染
                            setAuthLoading(false);
                            console.log('[Perf] Auth loading closed, UI rendering');
                        }
                    } catch (e) { }
                }

                // 异步加载数据，不阻塞渲染
                setTimeout(() => {
                    loadFromLocalStorage();
                    console.timeEnd('[Perf] Data Load');
                }, 0);
            }, []);

            // --- Firebase Auth 监听（等待 Firebase 加载完成后启用）---
            useEffect(() => {
                let unsubscribe;
                initFirebase().then(() => {
                    unsubscribe = auth.onAuthStateChanged(async (user) => {
                        setCurrentUser(user);
                        setAuthLoading(false);
                        console.log('[Perf] Firebase Auth ready');
                        if (user) {
                            syncWithFirestore(user.uid).catch(err => {
                                console.error('Background sync failed:', err);
                            });
                        }
                    });
                });
                return () => { if (unsubscribe) unsubscribe(); };
            }, []);

            // --- 首次渲染完成标记 ---
            useEffect(() => {
                console.timeEnd('[Perf] App Init');
                console.log('[Perf] ✅ First render complete');
            }, []);

            // --- 后台静默同步 Firestore ---
            const syncWithFirestore = async (userId) => {
                try {
                    setSyncStatus('syncing');
                    const doc = await db.collection('users').doc(userId).get();

                    if (doc.exists) {
                        const cloudData = doc.data();
                        const localData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

                        // 检查云端是否有有效数据（dimensions）
                        const cloudHasData = cloudData.dimensions && cloudData.dimensions.length > 0;

                        // 关键：如果云端有数据，说明是返回用户
                        if (cloudHasData) {
                            setIsNewUser(false);
                        } else {
                            // 云端无有效数据，说明是新用户
                            setIsNewUser(true);
                        }

                        // 比较更新时间，使用较新的数据
                        const cloudTime = cloudData.updatedAt ? new Date(cloudData.updatedAt).getTime() : 0;
                        const localTime = localData.updatedAt ? new Date(localData.updatedAt).getTime() : 0;

                        // 如果云端有数据且本地没有数据，或者云端数据更新
                        const localHasData = localData.dimensions && localData.dimensions.length > 0;

                        if (!localHasData || cloudTime > localTime) {
                            // 从云端加载数据 - 使用智能合并策略，保护本地非空数据

                            // 智能合并：优先使用非空值
                            const mergedData = {
                                name: cloudData.name || localData.name || name,
                                avatar: cloudData.avatar || localData.avatar || avatar,
                                dimensions: cloudData.dimensions || dimensions,
                                scores: cloudData.scores || scores,
                                history: cloudData.history || history,
                                systemTags: cloudData.systemTags || systemTags,
                                recentTags: cloudData.recentTags || recentTags,
                                monthlyPlans: cloudData.monthlyPlans || localData.monthlyPlans || monthlyPlans,
                                updatedAt: cloudData.updatedAt || new Date().toISOString()
                            };

                            // 设置 state
                            setName(mergedData.name);
                            setAvatar(mergedData.avatar);
                            setDimensions(mergedData.dimensions);
                            setScores(mergedData.scores);

                            // 直接加载历史记录，不执行迁移
                            // 标签迁移只在导入或手动触发时执行
                            if (mergedData.history) {
                                setHistory(mergedData.history);
                            }

                            setSystemTags(mergedData.systemTags);
                            setRecentTags(mergedData.recentTags);
                            if (mergedData.monthlyPlans) setMonthlyPlans(mergedData.monthlyPlans);

                            // 返回用户直接跳转到雷达图
                            if (cloudHasData) {
                                setStep(4);
                            }

                            // 保存合并后的数据到 localStorage
                            localStorage.setItem(STORAGE_KEY, JSON.stringify(mergedData));
                        } else if (localTime > cloudTime && localHasData) {
                            // 本地数据更新 - 智能合并，防止数据丢失

                            // 1. 智能合并 name/avatar：优先使用非空值
                            if (!localData.name && cloudData.name) {
                                setName(cloudData.name);
                                localData.name = cloudData.name;
                            } else if (!localData.name && !cloudData.name && name) {
                                // 如果本地和云端都没有，但当前 state 有，使用 state 的值
                                localData.name = name;
                            }

                            if (!localData.avatar && cloudData.avatar) {
                                setAvatar(cloudData.avatar);
                                localData.avatar = cloudData.avatar;
                            } else if (!localData.avatar && !cloudData.avatar && avatar) {
                                // 如果本地和云端都没有，但当前 state 有，使用 state 的值
                                localData.avatar = avatar;
                            }

                            // 2. 关键：如果本地 history 是空的但云端有数据，保留云端的
                            if ((!localData.history || localData.history.length === 0) &&
                                cloudData.history && cloudData.history.length > 0) {
                                // 直接加载，不执行迁移
                                // 标签迁移只在导入或手动触发时执行
                                localData.history = cloudData.history;
                                setHistory(cloudData.history);
                            }

                            // 3. 如果本地 scores 全是0或空，但云端有非零数据，保留云端的
                            const localScoresEmpty = !localData.scores ||
                                localData.scores.length === 0 ||
                                localData.scores.every(s => s === 0);
                            const cloudScoresHasData = cloudData.scores &&
                                cloudData.scores.some(s => s > 0);
                            if (localScoresEmpty && cloudScoresHasData) {
                                localData.scores = cloudData.scores;
                                setScores(cloudData.scores);
                            }

                            // 更新 localStorage 和云端
                            localStorage.setItem(STORAGE_KEY, JSON.stringify(localData));
                            await db.collection('users').doc(userId).set(localData, { merge: true });
                        }
                    } else {
                        // Firestore 没有该用户的文档，说明是全新用户
                        setIsNewUser(true);

                        // 如果本地有数据，上传到云端
                        if (localStorage.getItem(STORAGE_KEY)) {
                            const localData = JSON.parse(localStorage.getItem(STORAGE_KEY));
                            if (localData && localData.dimensions && localData.dimensions.length > 0) {
                                await db.collection('users').doc(userId).set(localData, { merge: true });
                                // 本地有数据说明这其实是老用户，重置 isNewUser
                                setIsNewUser(false);
                                setStep(4);
                            }
                        }
                    }
                    setSyncStatus('synced');
                } catch (e) {
                    console.error("Firestore sync error", e);
                    setSyncStatus('offline');
                }
            };

            // --- 保存数据 ---
            const saveData = async (newScores, newHistory, newDims, newName, newAvatar, newSystemTags, newRecentTags, newMonthlyPlans) => {
                const data = {
                    name: newName !== undefined ? newName : name,
                    avatar: newAvatar !== undefined ? newAvatar : avatar,
                    dimensions: newDims || dimensions,
                    scores: newScores || scores,
                    history: newHistory || history,
                    systemTags: newSystemTags || systemTags,
                    recentTags: newRecentTags !== undefined ? newRecentTags : recentTags,
                    monthlyPlans: newMonthlyPlans !== undefined ? newMonthlyPlans : monthlyPlans,
                    updatedAt: new Date().toISOString()
                };

                // 数据完整性检查
                const verifiedData = ensureDataIntegrity(data, { name, avatar });

                // 始终保存到 localStorage
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(verifiedData));
                } catch (e) { console.error("LocalStorage save error", e); }

                // 如果已登录，同步到 Firestore
                if (currentUser) {
                    try {
                        setSyncStatus('syncing');
                        await db.collection('users').doc(currentUser.uid).set(verifiedData, { merge: true });
                        setSyncStatus('synced');
                    } catch (e) {
                        console.error("Firestore save error", e);
                        setSyncStatus('offline');
                    }
                }
            };

            // --- 登录方法 ---
            const [authMode, setAuthMode] = useState('login'); // 'login' | 'register'
            const [authEmail, setAuthEmail] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [authError, setAuthError] = useState('');

            const signInWithGoogle = async () => {
                try {
                    setAuthError('');
                    const provider = new firebase.auth.GoogleAuthProvider();
                    await auth.signInWithPopup(provider);
                } catch (e) {
                    console.error("Google sign-in error", e);
                    setAuthError(getAuthErrorMessage(e.code));
                }
            };

            const signInWithEmail = async () => {
                if (!authEmail || !authPassword) {
                    setAuthError('请填写邮箱和密码');
                    return;
                }
                try {
                    setAuthError('');
                    await auth.signInWithEmailAndPassword(authEmail, authPassword);
                } catch (e) {
                    console.error("Email sign-in error", e);
                    setAuthError(getAuthErrorMessage(e.code));
                }
            };

            const signUpWithEmail = async () => {
                if (!authEmail || !authPassword) {
                    setAuthError('请填写邮箱和密码');
                    return;
                }
                if (authPassword.length < 6) {
                    setAuthError('密码至少需要6位');
                    return;
                }
                try {
                    setAuthError('');
                    await auth.createUserWithEmailAndPassword(authEmail, authPassword);
                } catch (e) {
                    console.error("Email sign-up error", e);
                    setAuthError(getAuthErrorMessage(e.code));
                }
            };

            const getAuthErrorMessage = (code) => {
                const messages = {
                    'auth/email-already-in-use': '该邮箱已被注册',
                    'auth/invalid-email': '邮箱格式不正确',
                    'auth/weak-password': '密码强度太弱',
                    'auth/user-not-found': '用户不存在',
                    'auth/wrong-password': '密码错误',
                    'auth/too-many-requests': '尝试次数过多，请稍后再试',
                    'auth/popup-closed-by-user': '登录窗口被关闭',
                    'auth/network-request-failed': '网络连接失败'
                };
                return messages[code] || '登录失败，请重试';
            };

            const signOut = async () => {
                try {
                    await auth.signOut();
                    setSyncStatus('idle');
                    setStep(1);
                    setAuthEmail('');
                    setAuthPassword('');
                } catch (e) {
                    console.error("Sign out error", e);
                }
            };

            // --- 导出逻辑 ---
            const handleExportJSON = () => {
                const dataStr = JSON.stringify({ name, avatar, dimensions, scores, history });
                const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
                const exportFileDefaultName = `lifematrix_backup_${new Date().toISOString().slice(0, 10)}.json`;

                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                linkElement.click();
            };

            const handleExportCSV = () => {
                if (!history || history.length === 0) {
                    alert("暂无数据可导出");
                    return;
                }
                let csvContent = "\uFEFF日期,时间,维度,内容,获得积分\n";
                history.forEach(item => {
                    const dateObj = new Date(item.timestamp || Date.now());
                    const date = dateObj.toLocaleDateString('zh-CN');
                    const time = dateObj.toLocaleTimeString('zh-CN');
                    const content = `"${(item.text || "").replace(/"/g, '""')}"`;
                    const row = `${date},${time},${item.dimName},${content},${item.pts}`;
                    csvContent += row + "\n";
                });
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `lifematrix_data_${new Date().toISOString().slice(0, 10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleImport = (fileContent) => {
                // 尝试检测文件格式：JSON 或 CSV
                const trimmed = fileContent.trim();

                // 如果以 { 开头，尝试解析为 JSON
                if (trimmed.startsWith('{')) {
                    try {
                        const data = JSON.parse(trimmed);
                        if (!data.dimensions || !data.scores) {
                            alert("JSON 文件格式不正确");
                            return;
                        }

                        // JSON 导入时，对历史记录执行标签迁移
                        let importedHistory = data.history || [];
                        if (importedHistory.length > 0) {
                            console.log('[Import] 正在为导入的 JSON 数据识别标签...');
                            importedHistory = migrateHistoryTags(importedHistory);
                        }

                        setName(data.name || "");
                        setAvatar(data.avatar || null);
                        setDimensions(data.dimensions);
                        setScores(data.scores);
                        setHistory(importedHistory);
                        if (data.systemTags) setSystemTags(data.systemTags);
                        if (data.recentTags) setRecentTags(data.recentTags);
                        saveData(data.scores, importedHistory, data.dimensions, data.name, data.avatar, data.systemTags, data.recentTags);
                        setStep(4);
                        setModalType(null);
                        alert("JSON 数据导入成功！");
                        return;
                    } catch (e) {
                        alert("JSON 解析失败，请检查文件是否损坏");
                        return;
                    }
                }

                // 否则尝试解析为 CSV（格式：日期,时间,维度,内容,获得积分）
                try {
                    // 标准化换行符，处理 Windows 和 Mac 的不同格式
                    const normalizedContent = trimmed.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
                    const lines = normalizedContent.split('\n').filter(line => line.trim());
                    if (lines.length < 2) {
                        alert("CSV 文件内容太少");
                        return;
                    }

                    // 检查表头 - 移除 BOM 和其他隐藏字符
                    const header = lines[0].replace(/^\uFEFF/, '').replace(/[\x00-\x1F]/g, '').trim();
                    console.log("CSV Header:", header); // 调试用

                    // 更宽松的检测：只要包含任意一个关键字就认为是有效 CSV
                    const isValidCSV = header.includes('日期') ||
                        header.includes('维度') ||
                        header.includes('内容') ||
                        header.includes('积分');
                    if (!isValidCSV) {
                        alert("CSV 格式不正确，需要包含：日期,时间,维度,内容,获得积分\n检测到的表头: " + header);
                        return;
                    }

                    // 解析数据行
                    const importedHistory = [];
                    const dimScoresMap = {}; // 用于累积各维度分数

                    for (let i = 1; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line) continue;

                        // 解析 CSV 行，处理引号中的逗号
                        const parts = [];
                        let current = '';
                        let inQuotes = false;
                        for (const char of line) {
                            if (char === '"') {
                                inQuotes = !inQuotes;
                            } else if (char === ',' && !inQuotes) {
                                parts.push(current.trim());
                                current = '';
                            } else {
                                current += char;
                            }
                        }
                        parts.push(current.trim());

                        if (parts.length >= 5) {
                            const [dateStr, timeStr, dimName, content, ptsStr] = parts;
                            const pts = parseInt(ptsStr) || 1;

                            // 解析日期时间
                            let timestamp;
                            try {
                                // 尝试解析中文日期格式 "2024/1/15" 或 "2024-1-15"
                                const dateNorm = dateStr.replace(/\//g, '-');
                                const timeNorm = timeStr || '12:00:00';
                                timestamp = new Date(`${dateNorm} ${timeNorm}`).getTime();
                                if (isNaN(timestamp)) timestamp = Date.now();
                            } catch {
                                timestamp = Date.now();
                            }

                            // 创建历史记录
                            const cleanedContent = content.replace(/""/g, '"'); // 还原转义的引号
                            const extractedTags = parseTagsFromText(cleanedContent); // 从文本中提取标签
                            const record = {
                                id: `imp_${Date.now()}_${i}`,
                                dimName: dimName || '未知',
                                text: cleanedContent,
                                pts: pts,
                                timestamp: timestamp,
                                tags: extractedTags
                            };
                            importedHistory.push(record);

                            // 累积分数
                            if (!dimScoresMap[dimName]) {
                                dimScoresMap[dimName] = 0;
                            }
                            dimScoresMap[dimName] += pts;
                        }
                    }

                    if (importedHistory.length === 0) {
                        alert("CSV 文件中没有找到有效数据");
                        return;
                    }

                    console.log(`[Import] CSV 导入完成，已为 ${importedHistory.length} 条记录识别标签`);

                    // 合并到现有数据
                    const mergedHistory = [...history, ...importedHistory];

                    // 更新分数（将导入的分数加到现有维度上）
                    const newScores = [...scores];
                    dimensions.forEach((dim, idx) => {
                        if (dimScoresMap[dim.name]) {
                            newScores[idx] = (newScores[idx] || 0) + dimScoresMap[dim.name];
                        }
                    });

                    setHistory(mergedHistory);
                    setScores(newScores);
                    saveData(newScores, mergedHistory, dimensions, name, avatar, systemTags, recentTags);
                    setStep(4);
                    setModalType(null);
                    alert(`CSV 导入成功！共恢复 ${importedHistory.length} 条记录`);

                } catch (e) {
                    console.error("CSV parse error:", e);
                    alert("CSV 解析失败，请检查文件格式");
                }
            };

            // --- Handlers ---
            const handleAvatarUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 150; canvas.height = 150;
                        canvas.getContext('2d').drawImage(img, 0, 0, 150, 150);
                        setAvatar(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            const addCustomDim = () => {
                if (!customDimName.trim() || dimensions.length >= 12) return;
                const newDims = [...dimensions, { id: `c_${Date.now()}`, name: customDimName, active: true, color: "bg-slate-400", text: "text-slate-400", border: "border-slate-200" }];
                setDimensions(newDims);
                setCustomDimName("");
            };

            const enterMatrix = () => {
                const initScores = new Array(dimensions.length).fill(0);
                setScores(initScores);
                setStep(4);
                saveData(initScores, [], null);
            };

            const handleRecordConfirm = (text, tags = []) => {
                if (!text || !text.trim()) return;

                const dim = dimensions[selectedDimIdx];

                // Add any NEW tags to systemTags (default: only apply to current dimension)
                const existingTagNames = systemTags.map(t => t.name);
                const newSystemTags = [...systemTags];
                let tagsUpdated = false;

                tags.forEach(tagName => {
                    if (!existingTagNames.includes(tagName)) {
                        newSystemTags.push({
                            id: `tag_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                            name: tagName,
                            appliesTo: [dim?.id] // Default: only this dimension
                        });
                        tagsUpdated = true;
                    }
                });

                if (tagsUpdated) {
                    setSystemTags(newSystemTags);
                }

                // 如果是编辑模式，调用编辑函数
                if (editingRecordIdx !== null) {
                    handleRecordEdit(text, tags, tagsUpdated ? newSystemTags : null);
                    return;
                }

                const newScores = [...(scores || [])];
                while (newScores.length <= selectedDimIdx) newScores.push(0);
                newScores[selectedDimIdx] = (newScores[selectedDimIdx] || 0) + 1;

                const entry = {
                    dimName: dim?.name || "未知",
                    dimColor: dim?.color || "bg-slate-400",
                    text: text,
                    tags: tags,
                    pts: 1,
                    timestamp: Date.now(),
                    dateStr: new Date().toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
                };

                const newHistory = [entry, ...(history || [])].slice(0, 100);
                setScores(newScores);
                setHistory(newHistory);
                setModalType(null);
                setEditingRecordIdx(null);
                saveData(newScores, newHistory, null, null, null, tagsUpdated ? newSystemTags : null);
            };

            const handleRecordEdit = (text, tags = [], newSystemTagsParam = null) => {
                if (!text || !text.trim() || editingRecordIdx === null) return;

                const newHistory = [...(history || [])];
                if (editingRecordIdx < newHistory.length) {
                    // 更新记录，保留原有的其他字段
                    newHistory[editingRecordIdx] = {
                        ...newHistory[editingRecordIdx],
                        text: text,
                        tags: tags
                    };
                    setHistory(newHistory);
                    setModalType(null);
                    setEditingRecordIdx(null);
                    saveData(null, newHistory, null, null, null, newSystemTagsParam);
                }
            };

            const handleRecordDelete = () => {
                if (editingRecordIdx === null) return;

                const newHistory = [...(history || [])];
                if (editingRecordIdx >= newHistory.length) return;

                const deletedRecord = newHistory[editingRecordIdx];

                // 找到对应维度的索引
                const dimIndex = dimensions.findIndex(d => d.name === deletedRecord.dimName);

                // 删除记录
                newHistory.splice(editingRecordIdx, 1);

                // 减少对应维度的分数（每条记录 = 1分）
                const newScores = [...(scores || [])];
                if (dimIndex >= 0 && newScores[dimIndex] > 0) {
                    newScores[dimIndex] = newScores[dimIndex] - 1;
                }

                setHistory(newHistory);
                setScores(newScores);
                setModalType(null);
                setEditingRecordIdx(null);
                saveData(newScores, newHistory, null);
            };

            const totalExp = (scores || []).reduce((a, b) => a + b, 0);
            const totalLevel = calculateLevel(totalExp);
            const balanceValue = calculateBalance(scores);

            // --- Views ---

            // 加载中状态 - 骨架屏
            if (authLoading) return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6">
                    <div className="w-full max-w-md animate-fade-in">
                        {/* Logo */}
                        <div className="flex justify-center mb-8">
                            <div className="inline-flex p-4 bg-sky-50 rounded-2xl text-sky-500 shadow-inner animate-pulse">
                                <Icon name="sparkle" size={32} />
                            </div>
                        </div>
                        {/* 骨架屏 - 雷达图 */}
                        <div className="bg-white rounded-[2.5rem] p-8 shadow-xl mb-4">
                            <div className="w-full aspect-square bg-slate-100 rounded-full animate-pulse"></div>
                        </div>
                        {/* 骨架屏 - 底部按钮 */}
                        <div className="flex gap-3">
                            <div className="flex-1 h-16 bg-white rounded-2xl animate-pulse"></div>
                            <div className="flex-1 h-16 bg-white rounded-2xl animate-pulse"></div>
                            <div className="flex-1 h-16 bg-white rounded-2xl animate-pulse"></div>
                        </div>
                    </div>
                </div>
            );

            // 登录/注册页面
            if (step === 1 && !currentUser) return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6">
                    <div className="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-xl shadow-slate-200/50 text-center animate-fade-in">
                        <div className="mb-8 space-y-4">
                            <div className="inline-flex p-4 bg-sky-50 rounded-2xl text-sky-500 shadow-inner"><Icon name="sparkle" size={32} /></div>
                            <h1 className="text-2xl font-black text-slate-800 tracking-tight">你好，旅行者。</h1>
                            <p className="text-slate-400 text-sm">欢迎进入人生这场无限游戏。</p>
                        </div>

                        <div className="space-y-4">
                            {/* Google 登录 */}
                            <button
                                onClick={signInWithGoogle}
                                className="w-full bg-white border-2 border-slate-200 hover:border-slate-300 hover:bg-slate-50 py-4 rounded-2xl flex items-center justify-center gap-3 transition-all"
                            >
                                <Icon name="google" size={20} className="text-slate-600" />
                                <span className="font-bold text-sm text-slate-700">使用 Google 继续</span>
                            </button>

                            <div className="flex items-center gap-4 my-6">
                                <div className="flex-1 h-px bg-slate-100"></div>
                                <span className="text-xs text-slate-300 font-bold">或使用邮箱</span>
                                <div className="flex-1 h-px bg-slate-100"></div>
                            </div>

                            {/* 邮箱表单 */}
                            <input
                                type="email"
                                value={authEmail}
                                onChange={e => setAuthEmail(e.target.value)}
                                placeholder="邮箱地址"
                                className="w-full bg-slate-50 rounded-2xl px-6 py-4 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-sky-100 transition-all"
                            />
                            <input
                                type="password"
                                value={authPassword}
                                onChange={e => setAuthPassword(e.target.value)}
                                placeholder="密码（至少6位）"
                                className="w-full bg-slate-50 rounded-2xl px-6 py-4 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-sky-100 transition-all"
                                onKeyDown={e => e.key === 'Enter' && signInWithEmail()}
                            />

                            {/* 错误提示 */}
                            {authError && (
                                <div className="bg-rose-50 border border-rose-100 rounded-xl px-4 py-3 text-rose-500 text-xs font-bold">
                                    {authError}
                                </div>
                            )}

                            {/* 登录 和 注册 按钮并排 */}
                            <div className="flex gap-3">
                                <button
                                    onClick={signInWithEmail}
                                    className="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl hover:scale-[1.02] active:scale-95 transition-all"
                                >
                                    登录
                                </button>
                                <button
                                    onClick={signUpWithEmail}
                                    className="flex-1 bg-sky-500 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg hover:bg-sky-400 hover:scale-[1.02] active:scale-95 transition-all"
                                >
                                    注册
                                </button>
                            </div>

                            <p className="text-slate-300 text-[10px] text-center">
                                新用户直接点击「注册」，老用户点击「登录」
                            </p>
                        </div>
                    </div>
                </div>
            );

            // 仅对新用户（没有云端数据）显示设置页面
            if (step === 1 && currentUser && isNewUser) return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6">
                    <div className="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-xl shadow-slate-200/50 text-center animate-fade-in">
                        <div className="mb-8 space-y-4">
                            <div className="inline-flex p-4 bg-sky-50 rounded-2xl text-sky-500 shadow-inner"><Icon name="sparkle" size={32} /></div>
                            <h1 className="text-2xl font-black text-slate-800 tracking-tight">开始设置</h1>
                            <p className="text-slate-400 text-sm">设置你的个人资料，开始你的旅程。</p>
                        </div>
                        <div className="space-y-6 flex flex-col items-center">
                            <div className="relative cursor-pointer group" onClick={() => fileInputRef.current.click()}>
                                <div className={`w-28 h-28 rounded-[2.2rem] flex items-center justify-center overflow-hidden transition-all border-2 ${avatar ? 'border-sky-100 shadow-xl' : 'bg-slate-50 border-dashed border-slate-200 group-hover:border-sky-300'}`}>
                                    {avatar ? <img src={avatar} className="w-full h-full object-cover" /> : <Icon name="user" size={36} className="text-slate-300" />}
                                </div>
                                <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleAvatarUpload} />

                            </div>
                            <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="输入你的昵称" className="w-full bg-slate-50 rounded-2xl px-6 py-4 text-center font-bold text-slate-700 outline-none" />
                            <button onClick={() => name && setStep(2)} disabled={!name} className={`w-full py-4 rounded-2xl font-black text-xs uppercase tracking-widest ${name ? 'bg-slate-900 text-white shadow-xl hover:scale-[1.02] active:scale-95 transition-all' : 'bg-slate-100 text-slate-300'}`}>开始设置</button>
                        </div>
                    </div>
                </div>
            );

            if (step === 2) return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 max-w-lg mx-auto animate-fade-in">

                        </div>
                        <div className="grid grid-cols-2 gap-3 mb-6">
                            {dimensions.map((dim, idx) => (
                                <div key={dim.id} className={`flex items-center gap-3 p-4 rounded-2xl border transition-all duration-300 ${dim.active ? 'bg-slate-50 border-slate-100 shadow-inner' : 'opacity-25 grayscale hover:opacity-50'}`}>
                                    <input type="text" value={dim.name} onChange={e => {
                                        const newDims = [...dimensions];
                                        newDims[idx].name = e.target.value;
                                        setDimensions(newDims);
                                    }} className={`w-full bg-transparent border-none p-0 focus:ring-0 font-bold text-xs ${dim.active ? 'text-slate-700' : 'text-slate-400'}`} />
                                    <button onClick={() => {

                            <button onClick={() => setStep(3)} className="flex-1 bg-sky-600 text-white py-4.5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-sky-100 active:scale-[0.98] transition-all">确认开启</button>
                        </div>
                    </div>
                </div>
            );

            if (step === 3) return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 max-w-lg mx-auto animate-fade-in">
                    <div className="bg-white w-full rounded-[3.5rem] p-8 shadow-xl shadow-slate-200/40 flex flex-col items-center justify-center relative h-auto min-h-[550px]">
                        <div className="absolute top-10 left-10 flex items-center gap-3">
                            <div className="w-12 h-12 rounded-2xl bg-slate-50 border border-slate-100 shadow-sm overflow-hidden">
                                {avatar ? <img src={avatar} className="w-full h-full object-cover" /> : <Icon name="user" className="p-3 text-slate-200" />}
                            </div>
                            <div className="text-left">
                                <div className="text-base font-black text-slate-800 leading-none">{name}</div>
                                <div className="text-[10px] text-sky-500 font-bold uppercase tracking-widest mt-1">Voyager Initialized</div>
                            </div>
                        </div>
                        {/* 只读雷达图 */}
                        <RadarChart dimensions={dimensions} scores={new Array(dimensions.length).fill(0)} onLabelClick={() => { }} size={400} />
                        <div className="text-center space-y-8 w-full mt-2">
                            <p className="text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">LifeMatrix System Standby</p>
                            <div className="flex gap-4 w-full px-2">
                                <button onClick={() => setStep(2)} className="flex-1 py-4 text-slate-400 font-bold text-xs uppercase tracking-widest border border-slate-100 rounded-2xl">修改</button>
                                <button onClick={enterMatrix} className="flex-[2] bg-slate-900 text-white py-4.5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl active:scale-95 transition-all">进入矩阵</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            // 4. Dashboard
            return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center p-4 md:p-8 pb-28">
                    {/* Header */}
                    <header className="w-full max-w-4xl flex justify-between items-start mb-8 relative">
                        {/* 左：日历 + 目标 */}
                        <div className="flex flex-col gap-2">
                            <button onClick={() => setModalType('calendar')} aria-label="查看日历" className="p-3 bg-white rounded-2xl shadow-sm text-slate-400 hover:text-sky-500 transition-colors"><Icon name="clock" size={20} /></button>
                            <button onClick={() => setModalType('monthlyPlan')} aria-label="月度目标" className="p-3 bg-white rounded-2xl shadow-sm text-slate-400 hover:text-violet-500 transition-colors"><Icon name="target" size={20} /></button>
                        </div>

                        <div className="flex flex-col items-center mt-2">
                            <div className="w-16 h-16 rounded-[1.8rem] bg-white p-1 shadow shadow-slate-200 overflow-hidden ring-4 ring-white border border-slate-50 mb-2">
                                {avatar ? <img src={avatar} className="w-full h-full object-cover rounded-[1.4rem]" /> : <Icon name="user" size={28} className="m-auto mt-4 text-slate-200" />}
                            </div>
                            <h2 className="text-xl font-black text-slate-800 leading-none mb-2">{name}</h2>
                            <div className="flex items-center gap-3">
                                <div className="flex items-center bg-slate-900 px-2.5 py-1 rounded-lg">
                                    <span className="text-[10px] font-black text-white uppercase tracking-tighter">Lv.{totalLevel}</span>
                                </div>
                                <div className="flex items-center gap-1.5 bg-white border border-slate-200 px-2.5 py-1 rounded-lg shadow-sm">
                                    <Icon name="scale" size={12} className="text-amber-500" />
                                    <span className="text-[10px] font-bold text-slate-600 tracking-tighter">平衡度 {balanceValue}%</span>
                                </div>
                            </div>
                            {/* 云同步状态 */}
                            <button
                                onClick={() => setModalType('auth')}
                                className={`mt-3 flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[10px] font-bold transition-all ${currentUser
                                    ? syncStatus === 'synced'
                                        ? 'bg-emerald-50 text-emerald-600 border border-emerald-100'
                                        : syncStatus === 'syncing'
                                            ? 'bg-sky-50 text-sky-500 border border-sky-100 animate-pulse'
                                            : 'bg-amber-50 text-amber-600 border border-amber-100'
                                    : 'bg-slate-100 text-slate-400 hover:bg-slate-200'
                                    }`}
                            >
                                <Icon name={currentUser ? (syncStatus === 'offline' ? 'cloudOff' : 'cloud') : 'cloud'} size={14} />
                                {currentUser
                                    ? syncStatus === 'synced'
                                        ? '已同步'
                                        : syncStatus === 'syncing'
                                            ? '同步中...'
                                            : '离线'
                                    : '登录同步'
                                }
                            </button>
                        </div>

                        {/* 右：设置 */}
                        <button onClick={() => setModalType('settings')} aria-label="设置" className="p-3 bg-white rounded-2xl shadow-sm text-slate-400 hover:text-slate-600 transition-colors"><Icon name="settings" size={20} /></button>
                    </header>

                    {/* Main Radar Card */}
                    <div className="w-full max-w-4xl bg-white rounded-[4rem] p-4 md:p-8 shadow-xl shadow-slate-200/50 flex flex-col items-center mb-10 relative overflow-visible min-h-[480px] md:min-h-[520px] justify-center">
                        <RadarChart
                            dimensions={dimensions}
                            scores={scores}
                            onLabelClick={(idx) => {
                                setSelectedDimIdx(idx);
                                setEditingRecordIdx(null); // 重置编辑状态
                                setModalType('record');
                            }}
                            size={480}
                        />
                        <div className="mt-4 text-[10px] font-black text-slate-300 uppercase tracking-[0.4em] animate-pulse">
                            Tap labels to record progress
                        </div>
                    </div>

                    {/* Monthly Progress Card */}
                    {(() => {
                        const mk = getMonthKey(new Date());
                        const cp = monthlyPlans[mk];
                        if (!cp || !cp.goals || cp.goals.length === 0) return null;
                        const now = new Date();
                        const curMonth = now.getMonth();
                        const curYear = now.getFullYear();
                        const mCounts = {};
                        (history || []).forEach(h => {
                            const d = new Date(h.timestamp);
                            if (d.getMonth() === curMonth && d.getFullYear() === curYear) {
                                const dm = dimensions.find(x => x.name === h.dimName);
                                if (dm) mCounts[dm.id] = (mCounts[dm.id] || 0) + 1;
                            }
                        });
                        const progresses = cp.goals.map(g => {
                            if (g.type === 'count') {
                                const a = g.dimId ? (mCounts[g.dimId] || 0) : 0;
                                return Math.min(100, Math.round((a / (g.targetCount || 1)) * 100));
                            }
                            const t = (g.tasks || []).length;
                            const dn = (g.tasks || []).filter(x => x.done).length;
                            return t > 0 ? Math.round((dn / t) * 100) : 0;
                        });
                        const overall = Math.round(progresses.reduce((a, b) => a + b, 0) / progresses.length);
                        return (
                            <div onClick={() => setModalType('monthlyPlan')} className="w-full max-w-4xl mb-6 cursor-pointer">
                                <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 hover:shadow-md transition-all active:scale-[0.99]">
                                    <div className="flex items-center justify-between mb-2">
                                        <div className="flex items-center gap-2">
                                            <Icon name="target" size={14} className="text-violet-500" />
                                            <span className="text-xs font-black text-slate-600">{curMonth + 1}月目标</span>
                                        </div>
                                        <span className="text-sm font-black text-slate-800">{overall}%</span>
                                    </div>
                                    <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden mb-2">
                                        <div className={`h-full rounded-full transition-all duration-500 ${overall >= 80 ? 'bg-emerald-400' : overall >= 50 ? 'bg-sky-400' : 'bg-amber-400'}`}
                                            style={{ width: `${overall}%` }} />
                                    </div>
                                    <div className="flex flex-wrap gap-x-3 gap-y-1">
                                        {cp.goals.slice(0, 4).map((g, i) => {
                                            const dm = dimensions.find(d => d.id === g.dimId);
                                            return (
                                                <span key={g.id} className="text-[10px] text-slate-400 flex items-center gap-1">
                                                    {dm && <span className={`w-1.5 h-1.5 rounded-full ${dm.color}`} />}
                                                    {g.title} {progresses[i]}%
                                                </span>
                                            );
                                        })}
                                        {cp.goals.length > 4 && <span className="text-[10px] text-slate-300">+{cp.goals.length - 4}</span>}
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    {/* History Feed */}
                    <div className="w-full max-w-4xl">
                        <div className="flex items-center gap-2 mb-6 px-2">
                            <Icon name="history" size={16} className="text-slate-400" />
                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">最近记录</h3>
                        </div>
                        <div className="space-y-4 px-2">
                            {(!history || history.length === 0) ? (
                                <div className="text-center py-12 bg-white/50 border-2 border-dashed border-slate-100 rounded-[2.5rem] text-slate-300 text-xs font-bold uppercase tracking-widest">等候点亮记录</div>
                            ) : (
                                history.slice(0, 5).map((h, i) => (
                                    <div key={i} className="bg-white p-5 rounded-[2rem] shadow-sm flex items-center justify-between border border-transparent animate-fade-in group">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 rounded-2xl bg-sky-50 flex items-center justify-center text-sky-500 font-black text-sm">+{h.pts}</div>
                                            <div>
                                                <div className="text-sm font-bold text-slate-700 whitespace-pre-wrap">{h.text}</div>
                                                {h.tags && h.tags.length > 0 && (
                                                    <div className="flex flex-wrap gap-1 mt-1.5">
                                                        {h.tags.map((tag, ti) => (
                                                            <span key={ti} className="bg-violet-50 text-violet-500 px-2 py-0.5 rounded text-[9px] font-bold">【{tag}】</span>
                                                        ))}
                                                    </div>
                                                )}
                                                <div className="text-[10px] font-bold text-slate-400 uppercase mt-1">{h.dimName} · {h.dateStr}</div>
                                            </div>
                                        </div>
                                        <button
                                            onClick={() => {
                                                setEditingRecordIdx(i);
                                                setModalType('record');
                                            }}
                                            className="p-2.5 rounded-xl bg-slate-50 text-slate-400 hover:bg-sky-50 hover:text-sky-500 transition-all md:opacity-0 md:group-hover:opacity-100"
                                            aria-label="编辑记录"
                                        >
                                            <Icon name="edit" size={16} />
                                        </button>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    {/* Modals */}
                    {modalType === 'record' && (
                        <RecordModal
                            dimName={editingRecordIdx !== null ? history[editingRecordIdx]?.dimName : dimensions[selectedDimIdx]?.name}
                            currentDimId={editingRecordIdx !== null
                                ? dimensions.find(d => d.name === history[editingRecordIdx]?.dimName)?.id
                                : dimensions[selectedDimIdx]?.id}
                            onClose={() => {
                                setModalType(null);
                                setEditingRecordIdx(null);
                            }}
                            onConfirm={handleRecordConfirm}
                            onDelete={editingRecordIdx !== null ? handleRecordDelete : null}
                            history={history}
                            systemTags={systemTags}
                            recentTags={recentTags}
                            initialText={editingRecordIdx !== null ? history[editingRecordIdx]?.text : ""}
                            initialTags={editingRecordIdx !== null ? (history[editingRecordIdx]?.tags || []) : []}
                            initialDate={editingRecordIdx !== null ? history[editingRecordIdx]?.timestamp : null}
                            isEdit={editingRecordIdx !== null}
                        />
                    )}

                    {modalType === 'calendar' && (
                        <MonthlyHistoryModal
                            onClose={() => setModalType(null)}
                            history={history}
                            dimensions={dimensions}
                        />
                    )}

                    {modalType === 'monthlyPlan' && (
                        <MonthlyPlanModal
                            onClose={() => setModalType(null)}
                            monthlyPlans={monthlyPlans}
                            history={history}
                            dimensions={dimensions}
                            scores={scores}
                            onSavePlan={(mk, updatedPlan) => {
                                const newPlans = { ...monthlyPlans, [mk]: updatedPlan };
                                setMonthlyPlans(newPlans);
                                saveData(null, null, null, undefined, undefined, undefined, undefined, newPlans);
                            }}
                            onToggleTask={(mk, goalId, taskId) => {
                                const plan = monthlyPlans[mk];
                                if (!plan) return;
                                const goalIdx = plan.goals.findIndex(g => g.id === goalId);
                                if (goalIdx < 0) return;
                                const goal = plan.goals[goalIdx];
                                const taskIdx = (goal.tasks || []).findIndex(t => t.id === taskId);
                                if (taskIdx < 0) return;
                                const task = goal.tasks[taskIdx];
                                const wasDone = task.done;
                                const newTasks = [...goal.tasks];
                                newTasks[taskIdx] = { ...task, done: !wasDone };
                                const newGoals = [...plan.goals];
                                newGoals[goalIdx] = { ...goal, tasks: newTasks };
                                const newPlan = { ...plan, goals: newGoals, updatedAt: Date.now() };
                                const newPlans = { ...monthlyPlans, [mk]: newPlan };

                                if (!wasDone && goal.dimId) {
                                    const dimIdx = dimensions.findIndex(d => d.id === goal.dimId);
                                    if (dimIdx >= 0) {
                                        const dim = dimensions[dimIdx];
                                        const newScores = [...(scores || [])];
                                        while (newScores.length <= dimIdx) newScores.push(0);
                                        newScores[dimIdx] = (newScores[dimIdx] || 0) + 1;
                                        const entry = {
                                            dimName: dim.name, dimColor: dim.color,
                                            text: `✅ [${goal.title}] ${task.text}`,
                                            tags: ['目标任务'], pts: 1,
                                            timestamp: Date.now(),
                                            dateStr: new Date().toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
                                        };
                                        const newHistory = [entry, ...(history || [])].slice(0, 100);
                                        setScores(newScores);
                                        setHistory(newHistory);
                                        setMonthlyPlans(newPlans);
                                        saveData(newScores, newHistory, null, undefined, undefined, undefined, undefined, newPlans);
                                        return;
                                    }
                                }
                                setMonthlyPlans(newPlans);
                                saveData(null, null, null, undefined, undefined, undefined, undefined, newPlans);
                            }}
                        />
                    )}

                    {modalType === 'settings' && (
                        <SettingsModal
                            onClose={() => setModalType(null)}
                            onExportJSON={handleExportJSON}
                            onExportCSV={handleExportCSV}
                            onImport={handleImport}
                            name={name}
                            avatar={avatar}
                            dimensions={dimensions}
                            systemTags={systemTags}
                            history={history}
                            onMigrateTags={() => {
                                const migratedHistory = migrateHistoryTags(history);
                                setHistory(migratedHistory);
                                saveData(scores, migratedHistory, dimensions, name, avatar, systemTags, recentTags);
                                const updatedCount = migratedHistory.filter(r => r.tags && r.tags.length > 0).length;
                                alert(`标签识别完成！共识别 ${updatedCount} 条记录的标签`);
                            }}
                            onSave={(newName, newAvatar, newDims, newSystemTags) => {
                                if (newName !== undefined) setName(newName);
                                if (newAvatar !== undefined) setAvatar(newAvatar);
                                if (newDims) setDimensions(newDims);
                                if (newSystemTags) setSystemTags(newSystemTags);
                                saveData(null, null, newDims, newName, newAvatar, newSystemTags);
                            }}
                            onSignOut={signOut}
                            currentUser={currentUser}
                        />
                    )}

                    {/* 登录/账号弹窗 */}
                    {modalType === 'auth' && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6 z-50 animate-fade-in">
                            <div className="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl flex flex-col gap-5">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="text-xl font-black text-slate-800">云同步</h3>
                                    <button onClick={() => setModalType(null)} className="text-slate-400 hover:text-slate-600"><Icon name="close" /></button>
                                </div>

                                {currentUser ? (
                                    <div className="space-y-4">
                                        <div className="bg-emerald-50 border border-emerald-100 rounded-2xl p-4 text-center">
                                            <div className="text-emerald-600 font-bold text-sm mb-1">已登录</div>
                                            <div className="text-emerald-500 text-xs truncate">{currentUser.email}</div>
                                        </div>
                                        <p className="text-xs text-slate-400 text-center">你的数据会自动同步到云端，可在任何设备访问。</p>
                                        <button
                                            onClick={async () => { await saveData(); }}
                                            className="w-full bg-sky-50 border border-sky-100 hover:bg-sky-100 py-4 rounded-2xl flex items-center justify-center gap-3 transition-all group"
                                        >
                                            <span className="p-1.5 bg-white rounded-full shadow-sm text-sky-500"><Icon name="cloud" size={16} /></span>
                                            <span className="font-bold text-xs text-sky-600">立即同步</span>
                                        </button>
                                        <button
                                            onClick={() => { signOut(); setModalType(null); }}
                                            className="w-full bg-slate-50 border border-slate-100 hover:bg-slate-100 py-4 rounded-2xl flex items-center justify-center gap-3 transition-all group"
                                        >
                                            <span className="p-1.5 bg-white rounded-full shadow-sm text-slate-400"><Icon name="logout" size={16} /></span>
                                            <span className="font-bold text-xs text-slate-500">退出登录</span>
                                        </button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        <p className="text-xs text-slate-400 text-center">登录后，你的数据将同步到云端，可在任何设备访问。</p>
                                        <button
                                            onClick={signInWithGoogle}
                                            className="w-full bg-white border-2 border-slate-200 hover:border-slate-300 hover:bg-slate-50 py-4 rounded-2xl flex items-center justify-center gap-3 transition-all group"
                                        >
                                            <Icon name="google" size={20} className="text-slate-600" />
                                            <span className="font-bold text-sm text-slate-700">使用 Google 登录</span>
                                        </button>
                                        <p className="text-[10px] text-slate-300 text-center">你目前的数据保存在本地，登录后会自动迁移到云端。</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}


                </div>
            );
        };

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (error) {
            console.error('React render error:', error);
            document.body.innerHTML = `<div style="padding: 20px; font-family: sans-serif;"><h1>Error</h1><pre>${error.message}\n\n${error.stack}</pre></div>`;
        }
    </script>
</body>

</html>
