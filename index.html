                                    className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xs font-bold text-slate-600 outline-none focus:ring-2 focus:ring-violet-100"
                                />
                                <p className="text-[9px] text-slate-300">Key 仅保存在本地浏览器，不会上传</p>
                            </div>

                            {/* Period Selection */}
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">选择时间范围</label>
                                <div className="flex flex-wrap gap-2">
                                    {periods.map(p => (
                                        <button
                                            key={p.id}
                                            onClick={() => setPeriod(p.id)}
                                            className={`px-3 py-2 rounded-xl text-xs font-bold transition-all ${period === p.id
                                                ? 'bg-violet-500 text-white shadow-sm'
                                                : 'bg-slate-100 text-slate-500 hover:bg-slate-200'
                                                }`}
                                        >
                                            {p.label}
                                        </button>
                                    ))}
                                </div>
                                <p className="text-[10px] text-slate-400">该时段共 <span className="font-bold text-violet-500">{filteredCount}</span> 条记录</p>
                            </div>

                            {/* Generate Button */}
                            <button
                                onClick={handleGenerate}
                                disabled={loading}
                                className="w-full bg-gradient-to-r from-violet-500 to-purple-500 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg hover:shadow-xl active:scale-95 transition-all disabled:opacity-50 flex items-center justify-center gap-2"
                            >
                                {loading ? (
                                    <>
                                        <svg className="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none" /><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" /></svg>
                                        正在生成...
                                    </>
                                ) : (
                                    <>
                                        <Icon name="sparkle" size={16} />
                                        生成 AI 回顾
                                    </>
                                )}
                            </button>

                            {/* Error */}
                            {error && (
                                <div className="bg-rose-50 border border-rose-200 rounded-xl p-4 text-rose-600 text-xs font-bold">
                                    {error}
                                </div>
                            )}

                            {/* Result */}
                            {result && (
                                <div className="bg-slate-50 rounded-2xl p-5 border border-slate-200 space-y-1">
                                    {renderMarkdown(result)}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 3.5 月度规划模态框
        // ==========================================
        const MonthlyPlanModal = ({ onClose, monthlyPlans, history, dimensions, scores, onSavePlan, onToggleTask }) => {
            const [activeTab, setActiveTab] = useState('plan');
            const [currDate, setCurrDate] = useState(new Date());
            const [showAddGoal, setShowAddGoal] = useState(false);
            const [newTitle, setNewTitle] = useState('');
            const [newType, setNewType] = useState('project');
            const [newDimId, setNewDimId] = useState(null);
            const [newTargetCount, setNewTargetCount] = useState(10);
            const [newTasks, setNewTasks] = useState([]);
            const [newNote, setNewNote] = useState('');
            const [newTaskText, setNewTaskText] = useState('');
            const [reviewText, setReviewText] = useState('');
            const [aiKey, setAiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
            const [aiLoading, setAiLoading] = useState(false);
            const [aiResult, setAiResult] = useState('');
            const [aiError, setAiError] = useState('');

            const year = currDate.getFullYear();
            const month = currDate.getMonth();
            const monthKey = `${year}-${String(month + 1).padStart(2, '0')}`;
            const plan = monthlyPlans[monthKey] || { goals: [], review: { text: '', aiReview: '' } };
            const activeDims = dimensions.filter(d => d.active);
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
            const daysLeft = isCurrentMonth ? daysInMonth - today.getDate() : 0;

            useEffect(() => {
                setReviewText(plan.review?.text || '');
                setAiResult(plan.review?.aiReview || '');
            }, [monthKey]);

            const monthRecordCounts = useMemo(() => {
                const counts = {};
                (history || []).forEach(h => {
                    const d = new Date(h.timestamp);
                    if (d.getMonth() === month && d.getFullYear() === year) {
                        const dim = dimensions.find(dm => dm.name === h.dimName);
                        if (dim) counts[dim.id] = (counts[dim.id] || 0) + 1;
                    }
                });
                return counts;
            }, [history, month, year, dimensions]);

            const getGoalProgress = (goal) => {
                if (goal.type === 'count') {
                    const actual = goal.dimId ? (monthRecordCounts[goal.dimId] || 0) : 0;
                    const target = goal.targetCount || 1;
                    return { actual, target, percent: Math.min(100, Math.round((actual / target) * 100)) };
                }
                const total = (goal.tasks || []).length;
                const done = (goal.tasks || []).filter(t => t.done).length;
                return { actual: done, target: total, percent: total > 0 ? Math.round((done / total) * 100) : 0 };
            };

            const overallProgress = useMemo(() => {
                if (plan.goals.length === 0) return 0;
                const total = plan.goals.reduce((sum, g) => sum + getGoalProgress(g).percent, 0);
                return Math.round(total / plan.goals.length);
            }, [plan.goals, monthRecordCounts]);

            const changeMonth = (delta) => {
                setCurrDate(new Date(year, month + delta, 1));
                setShowAddGoal(false);
            };

            const handleAddGoal = () => {
                if (!newTitle.trim()) return;
                const goal = {
                    id: `g_${Date.now()}`,
                    title: newTitle.trim(),
                    dimId: newDimId,
                    type: newType,
                    tasks: newType === 'project' ? newTasks : [],
                    targetCount: newType === 'count' ? newTargetCount : null,
                    note: newNote.trim(),
                };
                const updatedPlan = {
                    ...plan,
                    goals: [...plan.goals, goal],
                    updatedAt: Date.now(),
                    createdAt: plan.createdAt || Date.now(),
                };
                onSavePlan(monthKey, updatedPlan);
                setNewTitle(''); setNewType('project'); setNewDimId(null);
                setNewTargetCount(10); setNewTasks([]); setNewNote('');
                setShowAddGoal(false);
            };

            const handleDeleteGoal = (goalId) => {
                const updatedPlan = { ...plan, goals: plan.goals.filter(g => g.id !== goalId), updatedAt: Date.now() };
                onSavePlan(monthKey, updatedPlan);
            };

            const handleAddTask = () => {
                if (!newTaskText.trim()) return;
                setNewTasks([...newTasks, { id: `t_${Date.now()}`, text: newTaskText.trim(), done: false }]);
                setNewTaskText('');
            };

            const handleCopyLastMonth = () => {
                const lastKey = `${month === 0 ? year - 1 : year}-${String(month === 0 ? 12 : month).padStart(2, '0')}`;
                const lastPlan = monthlyPlans[lastKey];
                if (!lastPlan || lastPlan.goals.length === 0) { alert('上月没有计划可复制'); return; }
                const copiedGoals = lastPlan.goals.map(g => ({
                    ...g,
                    id: `g_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`,
                    tasks: (g.tasks || []).map(t => ({ ...t, id: `t_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`, done: false })),
                }));
                onSavePlan(monthKey, { ...plan, goals: [...plan.goals, ...copiedGoals], updatedAt: Date.now(), createdAt: plan.createdAt || Date.now() });
            };

            const handleSaveReview = () => {
                onSavePlan(monthKey, { ...plan, review: { ...plan.review, text: reviewText, createdAt: Date.now() }, updatedAt: Date.now() });
            };

            const handleGenerateAI = async () => {
                if (!aiKey.trim()) { setAiError('请先输入 Google Gemini API Key'); return; }
                const monthRecords = (history || []).filter(h => {
                    const d = new Date(h.timestamp);
                    return d.getMonth() === month && d.getFullYear() === year;
                });
                if (monthRecords.length === 0 && plan.goals.length === 0) { setAiError('本月没有记录和目标'); return; }
                setAiLoading(true); setAiError(''); setAiResult('');
                localStorage.setItem('gemini_api_key', aiKey);
                const goalsForAI = plan.goals.map(g => {
                    const p = getGoalProgress(g);
                    const dim = dimensions.find(d => d.id === g.dimId);
                    return { title: g.title, type: g.type, dimension: dim?.name || '未关联', progress: `${p.actual}/${p.target} (${p.percent}%)`, note: g.note };
                });
                const recordsForAI = monthRecords.map(r => ({ dimension: r.dimName, content: r.text, tags: r.tags || [], date: new Date(r.timestamp).toLocaleDateString('zh-CN') }));
                const prompt = `你是一位温暖、富有洞察力的生活教练。请根据用户 ${year}年${month + 1}月 的月度目标和实际记录，生成一份月度复盘。

## 月度目标
${JSON.stringify(goalsForAI, null, 2)}

## 实际记录
${JSON.stringify(recordsForAI, null, 2)}

## 输出要求
请用 Markdown 格式，包含：
1. **月度总览**：目标完成情况概要
2. **亮点与成就**：值得庆祝的进步
3. **待改进项**：未达成目标的分析和建议
4. **下月建议**：2-3条具体可行的行动建议

语气亲切鼓励，避免说教。`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${aiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message || 'API Error');
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '无法生成复盘';
                    setAiResult(text);
                    onSavePlan(monthKey, { ...plan, review: { ...plan.review, aiReview: text, createdAt: plan.review?.createdAt || Date.now() }, updatedAt: Date.now() });
                } catch (err) { setAiError(`生成失败: ${err.message}`); }
                finally { setAiLoading(false); }
            };

            const renderMarkdown = (md) => {
                if (!md) return null;
                return md.split('\n').map((line, i) => {
                    if (line.startsWith('## ')) return <h2 key={i} className="text-base font-black text-slate-700 mt-4 mb-2">{line.slice(3)}</h2>;
                    if (line.startsWith('### ')) return <h3 key={i} className="text-sm font-bold text-slate-600 mt-3 mb-1">{line.slice(4)}</h3>;
                    if (line.startsWith('- ')) return <li key={i} className="ml-4 text-slate-600 text-sm list-disc">{line.slice(2)}</li>;
                    if (line.match(/^\d+\.\s/)) return <li key={i} className="ml-4 text-slate-600 text-sm list-decimal">{line.replace(/^\d+\.\s/, '')}</li>;
                    if (line.trim() === '') return <div key={i} className="h-2" />;
                    const parts = line.split(/\*\*(.+?)\*\*/g);
                    return <p key={i} className="text-slate-600 text-sm my-0.5">{parts.map((p, j) => j % 2 === 1 ? <strong key={j}>{p}</strong> : p)}</p>;
                });
            };

            const getDimById = (id) => dimensions.find(d => d.id === id);

            const tabs = [
                { id: 'plan', label: '规划' },
                { id: 'track', label: '追踪' },
                { id: 'review', label: '复盘' }
            ];

            return (
                <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md flex items-center justify-center px-1 py-2 md:px-4 md:py-4 z-50 animate-fade-in overflow-hidden">
                    <div className="bg-slate-50 w-full max-w-full md:max-w-2xl rounded-[2.5rem] md:rounded-[3rem] flex flex-col h-[95vh] md:h-[85vh] shadow-2xl overflow-hidden relative">
                        {/* Header */}
                        <div className="p-5 pb-3 bg-white rounded-t-[2.5rem] shadow-sm z-10">
                            <div className="flex justify-between items-center mb-3">
                                <button onClick={() => changeMonth(-1)} className="p-2 hover:bg-slate-50 rounded-full text-slate-400 active:scale-95"><Icon name="left" /></button>
                                <div className="text-center">
                                    <h3 className="text-lg font-black text-slate-800 tracking-tight">{year}年 {month + 1}月</h3>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-0.5">Monthly Plan</p>
                                </div>
                                <button onClick={() => changeMonth(1)} className="p-2 hover:bg-slate-50 rounded-full text-slate-400 active:scale-95"><Icon name="right" /></button>
                            </div>
                            <div className="flex gap-1 bg-slate-100 p-1 rounded-xl">
                                {tabs.map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                                        className={`flex-1 py-2 rounded-lg text-xs font-black transition-all ${activeTab === tab.id ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                                        {tab.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Content */}
                        <div className="flex-1 overflow-y-auto p-4 no-scrollbar bg-slate-50">

                            {/* ========== 规划 Tab ========== */}
                            {activeTab === 'plan' && (
                                <div className="space-y-3 pb-24">
                                    {plan.goals.length === 0 && !showAddGoal && (
                                        <div className="text-center py-12 bg-white/50 border-2 border-dashed border-slate-200 rounded-2xl">
                                            <Icon name="target" size={32} className="mx-auto text-slate-300 mb-3" />
                                            <p className="text-sm font-bold text-slate-400 mb-1">还没有本月目标</p>
                                            <p className="text-xs text-slate-300">设定目标，让每月都有方向</p>
                                        </div>
                                    )}
                                    {plan.goals.map(goal => {
                                        const dim = getDimById(goal.dimId);
                                        const progress = getGoalProgress(goal);
                                        return (
                                            <div key={goal.id} className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
                                                <div className="flex items-start justify-between gap-2">
                                                    <div className="flex-1 min-w-0">
                                                        <div className="flex items-center gap-2 mb-1">
                                                            {dim && <div className={`w-2.5 h-2.5 rounded-full ${dim.color}`} />}
                                                            <span className="text-sm font-black text-slate-800 truncate">{goal.title}</span>
                                                            <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${goal.type === 'count' ? 'bg-sky-50 text-sky-500' : 'bg-violet-50 text-violet-500'}`}>
                                                                {goal.type === 'count' ? '计数' : '项目'}
                                                            </span>
                                                        </div>
                                                        {dim && <p className="text-[10px] text-slate-400 ml-[18px]">{dim.name}</p>}
                                                        {goal.note && <p className="text-xs text-slate-500 mt-1 ml-[18px]">{goal.note}</p>}
                                                        {goal.type === 'count' && <p className="text-xs text-slate-400 mt-1 ml-[18px]">目标 {goal.targetCount} 次 · 已完成 {progress.actual} 次</p>}
                                                        {goal.type === 'project' && goal.tasks.length > 0 && (
                                                            <p className="text-xs text-slate-400 mt-1 ml-[18px]">{progress.actual}/{progress.target} 子任务完成</p>
                                                        )}
                                                    </div>
                                                    <button onClick={() => handleDeleteGoal(goal.id)} className="text-slate-300 hover:text-rose-400 transition-colors p-1"><Icon name="trash" size={14} /></button>
                                                </div>
                                            </div>
                                        );
                                    })}

                                    {/* 新增目标表单 */}
                                    {showAddGoal && (
                                        <div className="bg-white rounded-2xl p-5 shadow-md border border-sky-100 space-y-4">
                                            <h4 className="text-sm font-black text-slate-700">新增目标</h4>
                                            <input value={newTitle} onChange={e => setNewTitle(e.target.value)} placeholder="目标标题（如：滑冰训练）"
                                                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-sky-100" />
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">目标类型</label>
                                                <div className="flex gap-2">
                                                    {[{id:'project',label:'项目拆解',desc:'拆为子任务逐一完成'},{id:'count',label:'打卡计数',desc:'按次数统计维度记录'}].map(t => (
                                                        <button key={t.id} onClick={() => setNewType(t.id)}
                                                            className={`flex-1 p-3 rounded-xl border text-left transition-all ${newType === t.id ? 'border-sky-300 bg-sky-50' : 'border-slate-200 hover:border-slate-300'}`}>
                                                            <div className="text-xs font-bold text-slate-700">{t.label}</div>
                                                            <div className="text-[10px] text-slate-400 mt-0.5">{t.desc}</div>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">关联维度（可选）</label>
                                                <div className="flex flex-wrap gap-2">
                                                    <button onClick={() => setNewDimId(null)}
                                                        className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${!newDimId ? 'bg-slate-700 text-white' : 'bg-slate-100 text-slate-500'}`}>
                                                        不关联
                                                    </button>
                                                    {activeDims.map(d => (
                                                        <button key={d.id} onClick={() => setNewDimId(d.id)}
                                                            className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${newDimId === d.id ? `${d.color} text-white` : 'bg-slate-100 text-slate-500'}`}>
                                                            {d.name}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                            {newType === 'count' && (
                                                <div className="space-y-2">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">目标次数</label>
                                                    <input type="number" value={newTargetCount} onChange={e => setNewTargetCount(Math.max(1, parseInt(e.target.value) || 1))} min="1"
                                                        className="w-24 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-sky-100" />
                                                </div>
                                            )}
                                            {newType === 'project' && (
                                                <div className="space-y-2">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">子任务</label>
                                                    {newTasks.map((t, i) => (
                                                        <div key={t.id} className="flex items-center gap-2 bg-slate-50 rounded-lg px-3 py-2">
                                                            <span className="text-xs text-slate-400 font-bold">{i + 1}.</span>
                                                            <span className="text-xs text-slate-600 flex-1">{t.text}</span>
                                                            <button onClick={() => setNewTasks(newTasks.filter((_, j) => j !== i))} className="text-slate-300 hover:text-rose-400"><Icon name="close" size={12} /></button>
                                                        </div>
                                                    ))}
                                                    <div className="flex gap-2">
                                                        <input value={newTaskText} onChange={e => setNewTaskText(e.target.value)} placeholder="添加子任务"
                                                            onKeyDown={e => e.key === 'Enter' && handleAddTask()}
                                                            className="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs text-slate-600 outline-none focus:ring-2 focus:ring-sky-100" />
                                                        <button onClick={handleAddTask} className="px-3 py-2 bg-slate-100 rounded-lg text-slate-500 hover:bg-slate-200 transition-colors"><Icon name="plus" size={14} /></button>
                                                    </div>
                                                </div>
                                            )}
                                            <input value={newNote} onChange={e => setNewNote(e.target.value)} placeholder="备注（可选）"
                                                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs text-slate-500 outline-none focus:ring-2 focus:ring-sky-100" />
                                            <div className="flex gap-2">
                                                <button onClick={() => setShowAddGoal(false)} className="flex-1 py-3 rounded-xl text-xs font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 transition-all">取消</button>
                                                <button onClick={handleAddGoal} disabled={!newTitle.trim()} className="flex-1 py-3 rounded-xl text-xs font-black text-white bg-sky-500 hover:bg-sky-600 disabled:opacity-40 transition-all">添加目标</button>
                                            </div>
                                        </div>
                                    )}

                                    {/* 操作按钮 */}
                                    <div className="flex gap-2">
                                        {!showAddGoal && (
                                            <button onClick={() => setShowAddGoal(true)} className="flex-1 py-3.5 rounded-2xl border-2 border-dashed border-slate-200 text-xs font-bold text-slate-400 hover:border-sky-300 hover:text-sky-500 transition-all flex items-center justify-center gap-2">
                                                <Icon name="plus" size={14} /> 新增目标
                                            </button>
                                        )}
                                        {plan.goals.length === 0 && !showAddGoal && (
                                            <button onClick={handleCopyLastMonth} className="py-3.5 px-5 rounded-2xl bg-white border border-slate-200 text-xs font-bold text-slate-400 hover:text-slate-600 transition-all">
                                                复制上月
                                            </button>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* ========== 追踪 Tab ========== */}
                            {activeTab === 'track' && (
                                <div className="space-y-4 pb-24">
                                    {plan.goals.length === 0 ? (
                                        <div className="text-center py-12 text-slate-300 text-xs font-bold">
                                            本月还没有设定目标，去「规划」Tab 添加吧
                                        </div>
                                    ) : (
                                        <>
                                            {/* 整体进度 */}
                                            <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                                                <div className="flex items-center justify-between mb-3">
                                                    <span className="text-xs font-black text-slate-400 uppercase tracking-widest">整体完成率</span>
                                                    <span className="text-2xl font-black text-slate-800">{overallProgress}%</span>
                                                </div>
                                                <div className="w-full h-3 bg-slate-100 rounded-full overflow-hidden">
                                                    <div className={`h-full rounded-full transition-all duration-500 ${overallProgress >= 80 ? 'bg-emerald-400' : overallProgress >= 50 ? 'bg-sky-400' : 'bg-amber-400'}`}
                                                        style={{ width: `${overallProgress}%` }} />
                                                </div>
                                                {isCurrentMonth && daysLeft > 0 && (
                                                    <p className="text-[10px] text-slate-400 mt-2 text-right">距月底还有 {daysLeft} 天</p>
                                                )}
                                            </div>

                                            {/* 各目标进度 */}
                                            {plan.goals.map(goal => {
                                                const dim = getDimById(goal.dimId);
                                                const progress = getGoalProgress(goal);
                                                return (
                                                    <div key={goal.id} className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
                                                        <div className="flex items-center gap-2 mb-2">
                                                            {dim && <div className={`w-2.5 h-2.5 rounded-full ${dim.color}`} />}
                                                            <span className="text-sm font-black text-slate-800 flex-1 truncate">{goal.title}</span>
                                                            <span className={`text-xs font-black ${progress.percent >= 80 ? 'text-emerald-500' : progress.percent >= 50 ? 'text-sky-500' : 'text-amber-500'}`}>
                                                                {progress.percent}%
                                                            </span>
                                                        </div>
                                                        {goal.note && <p className="text-[10px] text-slate-400 mb-2 ml-[18px]">{goal.note}</p>}

                                                        {goal.type === 'count' ? (
                                                            <div className="ml-[18px]">
                                                                <div className="flex items-center justify-between text-[10px] text-slate-400 mb-1">
                                                                    <span>{progress.actual} / {progress.target} 次</span>
                                                                </div>
                                                                <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                                                                    <div className={`h-full rounded-full transition-all duration-500 ${dim?.color || 'bg-sky-400'}`}

                                                                            {task.done && <Icon name="check" size={10} className="text-white" />}
                                                                        </div>

                                                                    </button>

                            )}

                            {/* ========== 复盘 Tab ========== */}
                            {activeTab === 'review' && (
                                <div className="space-y-4 pb-24">
                                    {plan.goals.length > 0 && (
                                        <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">

                                                        <span className="text-xs text-slate-400">{progress.actual}/{progress.target}</span>
                                                        <span className={`text-xs font-black ${progress.percent >= 80 ? 'text-emerald-500' : progress.percent >= 50 ? 'text-amber-500' : 'text-rose-400'}`}>
